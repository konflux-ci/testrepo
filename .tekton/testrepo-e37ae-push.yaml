apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/YasenT/testrepo?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "main"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: test-app
    appstudio.openshift.io/component: testrepo-e37ae
    pipelines.appstudio.openshift.io/type: build
  name: testrepo-e37ae-on-push
  namespace: user-ns2
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/ytrahnovkonflux/user-ns2/testrepo-e37ae:{{revision}}
  - name: dockerfile
    value: Dockerfile
  - name: pulp-repo-name
    value: releases
  pipelineSpec:
    description: |
      This pipeline is ideal for building container images from a Containerfile while maintaining trust after pipeline customization.

      _Uses `buildah` to create a container image leveraging [trusted artifacts](https://konflux-ci.dev/architecture/ADR/0036-trusted-artifacts.html). It also optionally creates a source image and runs some build-time tests. Information is shared between tasks using OCI artifacts instead of PVCs. EC will pass the [`trusted_task.trusted`](https://enterprisecontract.dev/docs/ec-policies/release_policy.html#trusted_task__trusted) policy as long as all data used to build the artifact is generated from trusted tasks.
      This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta?tab=tags)_
    finally:
    - name: show-sbom
      params:
      - name: IMAGE_URL
        value: $(tasks.build-image-index.results.IMAGE_URL)
      taskRef:
        params:
        - name: name
          value: show-sbom
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-show-sbom:0.1@sha256:002f7c8c1d2f9e09904035da414aba1188ae091df0ea9532cd997be05e73d594
        - name: kind
          value: task
        resolver: bundles
    params:
    - description: Source Repository URL
      name: git-url
      type: string
    - default: ""
      description: Revision of the Source Repository
      name: revision
      type: string
    - description: Fully Qualified Output Image
      name: output-image
      type: string
    - default: .
      description: Path to the source code of an application's component from where
        to build image.
      name: path-context
      type: string
    - default: Dockerfile
      description: Path to the Dockerfile inside the context specified by parameter
        path-context
      name: dockerfile
      type: string
    - default: "false"
      description: Force rebuild image
      name: rebuild
      type: string
    - default: "false"
      description: Skip checks against built image
      name: skip-checks
      type: string
    - default: "false"
      description: Execute the build with network isolation
      name: hermetic
      type: string
    - default: ""
      description: Build dependencies to be prefetched by Cachi2
      name: prefetch-input
      type: string
    - default: ""
      description: Image tag expiration time, time values could be something like
        1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
    - default: "false"
      description: Build a source image.
      name: build-source-image
      type: string
    - default: "false"
      description: Add built image into an OCI image index
      name: build-image-index
      type: string
    - default: []
      description: Array of --build-arg values ("arg=value" strings) for buildah
      name: build-args
      type: array
    - default: ""
      description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
      name: build-args-file
      type: string
    - default: "false"
      description: Whether to enable privileged mode, should be used only with remote
        VMs
      name: privileged-nested
      type: string
    - default: releases
      description: Pulp Maven repository name to upload artifacts to
      name: pulp-repo-name
      type: string
    results:
    - description: ""
      name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - description: ""
      name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - description: ""
      name: CHAINS-GIT_URL
      value: $(tasks.clone-repository.results.url)
    - description: ""
      name: CHAINS-GIT_COMMIT
      value: $(tasks.clone-repository.results.commit)
    tasks:
    - name: init
      params:
      - name: image-url
        value: $(params.output-image)
      - name: rebuild
        value: $(params.rebuild)
      - name: skip-checks
        value: $(params.skip-checks)
      taskRef:
        params:
        - name: name
          value: init
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-init:0.2@sha256:7a24924417260b7094541caaedd2853dc8da08d4bb0968f710a400d3e8062063
        - name: kind
          value: task
        resolver: bundles
    - name: clone-repository
      params:
      - name: url
        value: $(params.git-url)
      - name: revision
        value: $(params.revision)
      - name: ociStorage
        value: $(params.output-image).git
      - name: ociArtifactExpiresAfter
        value: $(params.image-expires-after)
      runAfter:
      - init
      taskRef:
        params:
        - name: name
          value: git-clone-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:8ecf57d5a6697ce709bee65b62781efe79a10b0c2b95e05576442b67fbd61744
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(tasks.init.results.build)
        operator: in
        values:
        - "true"
      workspaces:
      - name: basic-auth
        workspace: git-auth
    - name: prefetch-dependencies
      params:
      - name: input
        value: $(params.prefetch-input)
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      - name: ociStorage
        value: $(params.output-image).prefetch
      - name: ociArtifactExpiresAfter
        value: $(params.image-expires-after)
      runAfter:
      - clone-repository
      taskRef:
        params:
        - name: name
          value: prefetch-dependencies-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies-oci-ta:0.2@sha256:d48c621ae828a3cbca162e12ec166210d2d77a7ba23b0e5d60c4a1b94491adeb
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: git-basic-auth
        workspace: git-auth
      - name: netrc
        workspace: netrc
    - name: build-container
      params:
      - name: IMAGE
        value: $(params.output-image)
      - name: DOCKERFILE
        value: $(params.dockerfile)
      - name: CONTEXT
        value: $(params.path-context)
      - name: HERMETIC
        value: $(params.hermetic)
      - name: PREFETCH_INPUT
        value: $(params.prefetch-input)
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.image-expires-after)
      - name: COMMIT_SHA
        value: $(tasks.clone-repository.results.commit)
      - name: BUILD_ARGS
        value:
        - $(params.build-args[*])
      - name: BUILD_ARGS_FILE
        value: $(params.build-args-file)
      - name: PRIVILEGED_NESTED
        value: $(params.privileged-nested)
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: CACHI2_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
      runAfter:
      - prefetch-dependencies
      taskRef:
        params:
        - name: name
          value: buildah-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-buildah-oci-ta:0.4@sha256:6ac9d16f598c14a4b56e662eccda0a438e94aa8f87dd27a3ea0ff1abc6e00c66
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(tasks.init.results.build)
        operator: in
        values:
        - "true"
    - name: build-image-index
      params:
      - name: IMAGE
        value: $(params.output-image)
      - name: COMMIT_SHA
        value: $(tasks.clone-repository.results.commit)
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.image-expires-after)
      - name: ALWAYS_BUILD_INDEX
        value: $(params.build-image-index)
      - name: IMAGES
        value:
        - $(tasks.build-container.results.IMAGE_URL)@$(tasks.build-container.results.IMAGE_DIGEST)
      runAfter:
      - build-container
      taskRef:
        params:
        - name: name
          value: build-image-index
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-build-image-index:0.1@sha256:462ecbf94ec44a8b770d6ef8838955f91f57ee79795e5c18bdc0fcb0df593742
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(tasks.init.results.build)
        operator: in
        values:
        - "true"
    - name: upload-to-pulp
      params:
      - name: IMAGE_URL
        value: $(tasks.build-image-index.results.IMAGE_URL)
      - name: IMAGE_DIGEST
        value: $(tasks.build-image-index.results.IMAGE_DIGEST)
      - name: PULP_REPO_NAME
        value: $(params.pulp-repo-name)
      runAfter:
      - build-image-index
      taskSpec:
        params:
        - name: IMAGE_URL
          type: string
        - name: IMAGE_DIGEST
          type: string
        - name: PULP_REPO_NAME
          type: string
        - name: PULP_CONFIG
          type: string
          default: "/etc/pulp/cli.toml"
        - name: ARTIFACTS_PATH
          type: string
          default: "maven-artifacts"
        results:
        - name: UPLOAD_COUNT
          description: Number of artifacts successfully uploaded.
        volumes:
        - name: pulp-config
          secret:
            secretName: pulp-access
            optional: true
        steps:
        - name: extract-and-upload
          image: registry.access.redhat.com/ubi9/ubi:latest
          volumeMounts:
          - name: pulp-config
            mountPath: /etc/pulp
            readOnly: true
          env:
          - name: IMAGE_URL
            value: $(params.IMAGE_URL)
          - name: IMAGE_DIGEST
            value: $(params.IMAGE_DIGEST)
          - name: PULP_CONFIG
            value: $(params.PULP_CONFIG)
          - name: PULP_REPO_NAME
            value: $(params.PULP_REPO_NAME)
          - name: ARTIFACTS_PATH
            value: $(params.ARTIFACTS_PATH)
          script: |
            #!/usr/bin/env bash
            set -euo pipefail

            dnf install -y --setopt=install_weak_deps=False skopeo jq && dnf clean all

            if [[ ! -f "${PULP_CONFIG}" ]]; then
                echo "[ERROR] Pulp config file not found: ${PULP_CONFIG}"
                exit 1
            fi

            CLI_SECTION=$(sed -n '/^\[cli\]$/,/^\[/{ /^\[cli\]$/d; /^\[/d; p; }' "$PULP_CONFIG")

            parse_toml() {
                echo "$CLI_SECTION" \
                    | grep -E "^$1\s*=" 2>/dev/null \
                    | head -1 \
                    | sed 's/^[^=]*=\s*//; s/^"//; s/"$//' \
                    | tr -d "'\r" \
                    || true
            }

            PULP_URL=$(parse_toml base_url)
            PULP_DOMAIN=$(parse_toml domain)
            PULP_DOMAIN="${PULP_DOMAIN:-default}"
            PULP_USER=$(parse_toml username)
            PULP_PASS=$(parse_toml password)
            API_ROOT=$(parse_toml api_root)
            API_ROOT="${API_ROOT:-/api/pulp/}"
            MAVEN_API_ROOT="${API_ROOT%/}/maven"

            if [[ -z "$PULP_URL" ]]; then
                echo "[ERROR] base_url not found in ${PULP_CONFIG}"
                exit 1
            fi

            CURL_AUTH=()
            if [[ -n "$PULP_USER" ]] && [[ -n "$PULP_PASS" ]]; then
                CURL_AUTH+=(-u "${PULP_USER}:${PULP_PASS}")
            fi

            echo "[INFO] Pulp server: ${PULP_URL}  domain: ${PULP_DOMAIN}"
            echo "[INFO] Maven API:   ${MAVEN_API_ROOT}"
            echo "[INFO] Target repository: ${PULP_REPO_NAME}"

            WORKDIR=$(mktemp -d)
            trap "rm -rf ${WORKDIR}" EXIT

            echo "[INFO] Pulling image ${IMAGE_URL}@${IMAGE_DIGEST} ..."
            skopeo copy --src-tls-verify=false \
                "docker://${IMAGE_URL}@${IMAGE_DIGEST}" \
                "dir:${WORKDIR}/image"

            echo "[INFO] Extracting layers..."
            mkdir -p "${WORKDIR}/extracted"

            manifest="${WORKDIR}/image/manifest.json"
            if [[ ! -f "$manifest" ]]; then
                echo "[ERROR] No manifest.json in pulled image"
                exit 1
            fi

            for layer_digest in $(jq -r '.layers[].digest' "$manifest" | sed 's/sha256://'); do
                layer_file="${WORKDIR}/image/${layer_digest}"
                if [[ -f "$layer_file" ]]; then
                    tar xf "$layer_file" -C "${WORKDIR}/extracted/" 2>/dev/null || true
                fi
            done

            ARTIFACTS_DIR="${WORKDIR}/extracted/${ARTIFACTS_PATH}"
            if [[ ! -d "$ARTIFACTS_DIR" ]]; then
                echo "[WARN] No /${ARTIFACTS_PATH}/ directory in image; skipping upload"
                echo -n "0" > "$(results.UPLOAD_COUNT.path)"
                exit 0
            fi

            if [[ "$PULP_DOMAIN" != "default" ]]; then
                DEPLOY_BASE="${PULP_URL}${MAVEN_API_ROOT}/${PULP_DOMAIN}/${PULP_REPO_NAME}"
            else
                DEPLOY_BASE="${PULP_URL}${MAVEN_API_ROOT}/${PULP_REPO_NAME}"
            fi

            upload_count=0

            while IFS= read -r filepath; do
                [[ -f "$filepath" ]] || continue
                relative_path="${filepath#${ARTIFACTS_DIR}/}"
                deploy_url="${DEPLOY_BASE}/${relative_path}"

                echo "[INFO] Uploading ${relative_path} ..."

                response=$(curl -s -w "\n%{http_code}" "${CURL_AUTH[@]}" \
                    -X PUT --data-binary "@${filepath}" \
                    -H "Content-Type: application/octet-stream" \
                    "${deploy_url}")
                http_code=$(echo "$response" | tail -1)
                body=$(echo "$response" | sed '$d')

                if [[ "$http_code" == "201" ]]; then
                    echo "  Uploaded successfully"
                    upload_count=$((upload_count + 1))
                else
                    echo "  FAILED (HTTP ${http_code}): ${body}"
                    exit 1
                fi
            done < <(find "${ARTIFACTS_DIR}" -type f | sort)

            echo "[INFO] Uploaded ${upload_count} artifact(s)"
            echo -n "${upload_count}" > "$(results.UPLOAD_COUNT.path)"
            echo "[INFO] Done."
    - name: build-source-image
      params:
      - name: BINARY_IMAGE
        value: $(params.output-image)
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
